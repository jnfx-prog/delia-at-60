<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest List - 60th Birthday</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .guest-card {
            max-width: 400px;
            margin: auto;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            padding: 10px;
            border-bottom: 1px solid #D4AF37;
            color: #333;
            font-size: 1.2rem;
        }

        .back-link {
            display: block;
            margin-top: 30px;
            color: #D4AF37;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="card guest-card">
            <h1 class="main-title"><span class="golden-text">Guest List</span></h1>
            <p>To maintain privacy, the live guest list is hosted securely.</p>
            <br>
            <a href="https://docs.google.com/spreadsheets/d/1wIa8lcHa3iqrYRqbOad-xPlY7CrCa5_LhykngieVwVA/edit?usp=sharing"
                target="_blank" class="view-guests" style="font-weight: bold; font-size: 1.1rem;">
                Click to View Confirmed Guests ✨
            </a>
            <br>
            <a href="index.html" class="back-link">← Back to Invitation</a>

        </div>

        <script>
            const listContainer = document.getElementById('list');
            const guests = JSON.parse(localStorage.getItem('partyGuests')) || [];

            if (guests.length === 0) {
                listContainer.innerHTML = "<li>No guests have RSVP'd yet.</li>";
            } else {
                guests.forEach(name => {
                    const li = document.createElement('li');
                    li.textContent = name;
                    listContainer.appendChild(li);
                });
            }
        </script>
</body>

</html>
