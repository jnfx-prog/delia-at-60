<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delia @60: You're Invited</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="hidden-content">
    <div class="main-container">

        <div class="gold-gradient-bg"></div>

        <div class="card">

            <div class="ornament top-ornament"></div>

            <header>
                <h2 class="pre-title">Please join us for</h2>
                <h1 class="main-title">A Diamond<br>
                    <span class="golden-text">Celebration</span>
                </h1>
                <div class="sixty-motif">60</div>
            </header>

            <section class="details">
                <p class="honor">Honoring the 60th Birthday of</p>
                <p class="name">DELIA DAÑO DIOSO</p>
                <hr class="gold-line">
                <p class="time-place">
                    SUNDAY, APRIL 19, 2026<br>
                    1:00 PM <span class="dot">•</span> Brgy. Cabalhin Covered Court
                </p>
            </section>

            <footer>
                <div id="rsvp-form">
                    <input type="text" id="guestName" placeholder="Your Full Name" required>
                    <br>
                    <button id="rsvpBtn">Kindly RSVP</button>
                </div>

                <p id="message" class="hidden-message">
                    We've added you to the guest list, <span id="displayName"></span>! ✨
                </p>

                <div class="guest-link-container">
                    <a href="guests.html" class="view-guests">View Guest List</a>
                </div>
            </footer>

            <div class="ornament bottom-ornament"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>


</html>
