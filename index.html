<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegance at 60: You're Invited</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="hidden-content">
<!-- Fullscreen background image -->
<div class="bg-image" aria-hidden="true" role="presentation"></div>
    <div class="main-container">

        <div class="gold-gradient-bg"></div>

        <div class="card">

            <div class="ornament top-ornament"></div>

            <header>
                <h2 class="pre-title">Please join us for</h2>
                <h1 class="main-title">A Diamond<br>
                    <span class="golden-text">Celebration</span>
                </h1>
                <div class="sixty-motif">60</div>
            </header>

            <section class="details">
                <p class="honor">Honoring the 60th Birthday of</p>
                <p class="name">DELIA DAÑO DIOSO</p>
                <hr class="gold-line">
                <p class="time-place">
                    SUNDAY, APRIL 19, 2026<br>
                    1:00 PM <span class="dot">•</span> Calubian, Leyte
                </p>
            </section>

            <footer>
  <!-- Semantic form for progressive enhancement -->
  <form id="rsvp-form" class="rsvp-form" autocomplete="off" novalidate>
    <label for="guestName" class="visually-hidden">Your full name</label>
    <input type="text" id="guestName" name="guestName" placeholder="Your Full Name" maxlength="80" required aria-required="true" />
    <button id="rsvpBtn" type="submit">Kindly RSVP</button>
  </form>

  <p id="message" class="hidden-message" role="status" aria-live="polite">
    <!-- Message content will be set by script -->
  </p>

  <div class="guest-link-container">
    <a href="guests.html" class="view-guests">View Guest List</a>
  </div>
</footer>

            <div class="ornament bottom-ornament"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
